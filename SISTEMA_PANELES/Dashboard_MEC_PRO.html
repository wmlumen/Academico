<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEC PRO 2026 | Tablero Cinemático</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&family=Space+Mono&display=swap" rel="stylesheet">
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        paper: '#E8E4DD',
                        signalRed: '#E63B2E',
                        offWhite: '#F5F3EE',
                        coal: '#111111',
                    },
                    borderRadius: {
                        'cinematic': '2.5rem',
                    }
                }
            }
        }
    </script>
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <!-- React & UMD Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        body {
            background-color: #F5F3EE;
            color: #111111;
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
            margin: 0;
        }

        .noise-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            pointer-events: none;
            opacity: 0.05;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .drama-italic { font-family: 'DM Serif Display', serif; font-style: italic; }
        .mono { font-family: 'Space Mono', monospace; }

        .magnetic-btn { transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .magnetic-btn:hover { transform: scale(1.03) translateY(-2px); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #F5F3EE; }
        ::-webkit-scrollbar-thumb { background: #111111; border-radius: 10px; }

        #loading-overlay {
            position: fixed; inset: 0; background: #F5F3EE;
            display: flex; align-items: center; justify-content: center;
            z-index: 10000; font-family: 'Space Mono', monospace;
        }

        .stack-card {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: sticky;
            top: 0;
        }
    </style>
</head>
<body>
    <div id="loading-overlay">CARGANDO MEC PRO 2026...</div>
    <div class="noise-overlay"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (window.lucide && ref.current) {
                    ref.current.innerHTML = lucide.createIcons({
                        icons: { [name]: true },
                        attrs: { width: size, height: size, class: className }
                    });
                }
            }, [name, size, className]);
            return <span ref={ref} className="inline-flex items-center justify-center translate-y-[-1px]" />;
        };

        const DAY_NAMES = ["Domingo", "Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"];

        // --- Mock Data ---
        const INITIAL_PLANS = [
            { id: 'CIENCIAS7', title: 'Plan Anual Ciencias 7º', level: 'EEB', content: '# Plan Anual: Ciencias 7º\nUnidad 1: La Célula.' },
            { id: 'TALLER1', title: 'Taller de Construcciones I', level: 'BT', content: '# Taller I\nNormas de Seguridad Ocupacional.' },
            { id: 'ETICA7', title: 'Plan Anual Ética 7º', level: 'EEB', content: '# Ética 7º\nValores y Convivencia.' }
        ];

        // --- Components ---

        const Navbar = ({ activeView, setView }) => {
            const [scrolled, setScrolled] = useState(false);
            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <nav className={`fixed left-1/2 -translate-x-1/2 top-8 z-[100] transition-all duration-700 flex items-center px-6 py-3 rounded-full gap-8
                    ${scrolled ? 'bg-offWhite/80 backdrop-blur-2xl border border-black/5 shadow-2xl scale-95' : 'bg-transparent text-black'}`}>
                    <div className="flex items-center gap-3 pr-6 border-r border-black/10">
                        <div className="w-10 h-10 bg-signalRed rounded-2xl flex items-center justify-center text-white shadow-lg shadow-signalRed/20">
                            <Icon name="Clock" size={20} />
                        </div>
                        <span className="font-bold tracking-tight hidden md:block uppercase text-xs mono">MEC PRO</span>
                    </div>
                    <div className="flex items-center gap-2">
                        {[
                            { id: 'dashboard', icon: 'LayoutDashboard', label: 'Tablero' },
                            { id: 'wizard', icon: 'CalendarPlus', label: 'Cátedra' },
                            { id: 'library', icon: 'Archive', label: 'Planes' }
                        ].map(item => (
                            <button key={item.id} onClick={() => setView(item.id)}
                                className={`flex items-center gap-2 px-5 py-2.5 rounded-full transition-all magnetic-btn
                                    ${activeView === item.id ? 'bg-coal text-white shadow-xl' : 'text-black/50 hover:text-black hover:bg-black/5'}`}>
                                <Icon name={item.icon} size={16} />
                                <span className="text-xs font-bold uppercase tracking-wider hidden sm:block">{item.label}</span>
                            </button>
                        ))}
                    </div>
                </nav>
            );
        };

        const Hero = ({ today }) => {
            const heroRef = useRef(null);
            useEffect(() => {
                const ctx = gsap.context(() => {
                    gsap.from(".hero-text > div", { y: 100, opacity: 0, duration: 1.5, stagger: 0.2, ease: "power4.out" });
                }, heroRef);
                return () => ctx.revert();
            }, []);
            return (
                <section ref={heroRef} className="h-screen flex flex-col justify-center p-8 md:p-24 relative overflow-hidden bg-paper">
                    <div className="absolute top-0 right-0 w-1/2 h-full bg-signalRed/5 translate-x-1/4 -skew-x-12"></div>
                    <div className="hero-text relative z-10">
                        <div className="mono text-xs uppercase tracking-[0.4em] font-bold text-signalRed mb-8">Administración Pedagógica // 2026</div>
                        <div className="text-8xl md:text-[18rem] font-bold leading-[0.8] tracking-tighter">Hoy es</div>
                        <div className="text-7xl md:text-[15rem] leading-[0.9] drama-italic text-signalRed">{today}.</div>
                    </div>
                    <div className="mt-12 flex items-center gap-6 opacity-30 mono text-xs uppercase tracking-widest relative z-10">
                        <span>Status: Operacional</span>
                        <div className="w-1.5 h-1.5 rounded-full bg-signalRed animate-pulse"></div>
                        <span>Región: Paraguay</span>
                    </div>
                </section>
            );
        };

        const Matriz = ({ catedras, deleteCatedra, openViewer }) => {
            const now = new Date();
            const currentTime = now.getHours() + ":" + now.getMinutes().toString().padStart(2, '0');
            const items = catedras.filter(c => c.day === now.getDay()).sort((a,b) => a.start.localeCompare(b.start));

            return (
                <div className="bg-white rounded-cinematic p-10 shadow-2xl border border-black/5">
                    <div className="flex justify-between items-center mb-12">
                        <div>
                            <h2 className="text-4xl font-bold uppercase tracking-tighter">Matriz Diaria</h2>
                            <p className="mono text-[10px] uppercase opacity-40 mt-2">Cátedras Vinculadas Cronológicamente</p>
                        </div>
                        <div className="w-16 h-16 bg-offWhite rounded-3xl flex items-center justify-center">
                            <Icon name="LayoutDashboard" size={32} />
                        </div>
                    </div>
                    <div className="space-y-6">
                        {items.length === 0 ? (
                            <div className="py-24 text-center border-2 border-dashed border-black/5 rounded-cinematic">
                                <Icon name="Calendar" size={40} className="mb-4 opacity-10" />
                                <div className="mono text-[10px] uppercase opacity-40">Sin actividades para hoy</div>
                            </div>
                        ) : items.map(c => {
                            const isNow = currentTime >= c.start && currentTime <= c.end;
                            return (
                                <div key={c.id} className={`group flex flex-col md:flex-row items-center gap-8 p-8 rounded-cinematic transition-all border
                                    ${isNow ? 'bg-signalRed border-transparent text-white shadow-2xl shadow-signalRed/30' : 'bg-offWhite border-black/5 hover:border-black/20 hover:translate-x-2'}`}>
                                    <div className="flex flex-col text-center md:text-left min-w-[120px]">
                                        <span className="mono text-[10px] uppercase opacity-40">Tiempo</span>
                                        <span className="text-2xl font-bold">{c.start} — {c.end}</span>
                                        {isNow && <span className="mt-2 text-[9px] font-bold mono bg-white/20 px-3 py-1 rounded-full text-center">EN CURSO</span>}
                                    </div>
                                    <div className="flex-1 text-center md:text-left">
                                        <span className="mono text-[10px] uppercase opacity-40">Materia / Institución</span>
                                        <div className="text-2xl font-bold uppercase leading-tight">{c.subject}</div>
                                        <div className="text-xs font-medium opacity-60 mt-1 uppercase tracking-wider">{c.inst} • SECCIÓN {c.sec}</div>
                                    </div>
                                    <div className="flex gap-3">
                                        <button onClick={() => openViewer(c.subject)} className="p-4 bg-white/10 hover:bg-white/20 rounded-2xl transition-all shadow-sm">
                                            <Icon name="BookOpen" size={20} />
                                        </button>
                                        <button onClick={() => deleteCatedra(c.id)} className="p-4 bg-white/10 hover:bg-white/20 rounded-2xl transition-all shadow-sm">
                                            <Icon name="Trash2" size={20} />
                                        </button>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const Telemetria = () => (
            <div className="bg-coal text-white p-10 rounded-cinematic shadow-2xl relative overflow-hidden h-full flex flex-col">
                <div className="absolute -right-10 -bottom-10 opacity-5 scale-150 rotate-12"><Icon name="PlayCircle" size={200} /></div>
                <div className="flex items-center gap-4 mb-10">
                    <div className="w-2.5 h-2.5 rounded-full bg-signalRed animate-pulse shadow-lg shadow-signalRed/50"></div>
                    <span className="mono text-[10px] uppercase tracking-[0.3em] font-bold">Telemetría Administrativa</span>
                </div>
                <div className="mono text-2xl md:text-4xl font-bold leading-tight flex-1">
                    ESTADO: <span className="text-signalRed">OPERACIONAL</span><br/>
                    FASE 01: MATRIZ OK<br/>
                    FASE 02: SYNC RSA
                </div>
                <div className="mt-12 grid grid-cols-2 gap-y-4 opacity-50 mono text-[9px] uppercase tracking-widest">
                    <div className="flex items-center gap-3"><Icon name="CheckCircle" size={12}/> UI Cinemática</div>
                    <div className="flex items-center gap-3 text-white opacity-100"><Icon name="PlayCircle" size={12}/> React 19 Core</div>
                    <div className="flex items-center gap-3"><Icon name="Circle" size={12}/> Reportes RSA</div>
                    <div className="flex items-center gap-3"><Icon name="Circle" size={12}/> Sync Backend</div>
                </div>
            </div>
        );

        const App = () => {
            const [view, setView] = useState('dashboard');
            const [catedras, setCatedras] = useState(() => JSON.parse(localStorage.getItem('mec_matrix_v17')) || []);
            const [viewer, setViewer] = useState(null);

            useEffect(() => {
                localStorage.setItem('mec_matrix_v17', JSON.stringify(catedras));
            }, [catedras]);

            useEffect(() => {
                setTimeout(() => {
                    gsap.to("#loading-overlay", { opacity: 0, duration: 1, onComplete: () => document.getElementById('loading-overlay').style.display = 'none' });
                }, 800);
            }, []);

            return (
                <div className="min-h-screen">
                    <Navbar activeView={view} setView={setView} />
                    
                    {view === 'dashboard' && (
                        <>
                            <Hero today={DAY_NAMES[new Date().getDay()]} />
                            <section className="max-w-7xl mx-auto px-8 pb-32 grid grid-cols-1 lg:grid-cols-3 gap-12 -mt-20 relative z-20">
                                <div className="lg:col-span-2">
                                    <Matriz catedras={catedras} deleteCatedra={(id) => setCatedras(catedras.filter(c => c.id !== id))} openViewer={(s) => setViewer(INITIAL_PLANS.find(p => s.includes(p.title)) || INITIAL_PLANS[0])} />
                                </div>
                                <div className="space-y-12">
                                    <div className="h-[400px]"><Telemetria /></div>
                                    <div className="bg-paper p-10 rounded-cinematic flex flex-col justify-between h-[300px] border border-black/5">
                                        <div>
                                            <h3 className="text-xl font-bold uppercase mb-4 tracking-tighter text-coal/80">Gestión de Carga</h3>
                                            <p className="text-sm opacity-50 mono leading-relaxed uppercase">Vincula nuevos rubros MEC y planes de contingencia para el aula 2026.</p>
                                        </div>
                                        <button onClick={() => setView('wizard')} className="w-full bg-coal text-white py-6 rounded-2xl font-bold uppercase text-xs tracking-[0.2em] magnetic-btn">
                                            Vincular Rubro <Icon name="Plus" size={14} className="ml-2"/>
                                        </button>
                                    </div>
                                </div>
                            </section>
                        </>
                    )}

                    {view === 'wizard' && (
                        <section className="pt-48 pb-32 px-8 max-w-4xl mx-auto">
                            <h2 className="text-7xl font-bold uppercase tracking-tighter mb-16 leading-[0.8]">Nueva <span className="drama-italic text-signalRed">Cátedra</span></h2>
                            <div className="bg-white p-12 rounded-cinematic shadow-2xl space-y-12">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                                    <div className="md:col-span-2">
                                        <label className="mono text-[10px] uppercase font-bold text-signalRed mb-4 block tracking-widest">Materia / Plan MEC</label>
                                        <select className="w-full p-6 bg-offWhite rounded-3xl outline-none font-bold uppercase text-sm border-2 border-transparent focus:border-signalRed/10 transition-all appearance-none cursor-pointer">
                                            <option>Célula y Salud 7º</option>
                                            <option>Ética y Ciudadanía 8º</option>
                                            <option>Taller de Construcciones I</option>
                                            <option>Dibujo Técnico II</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="mono text-[10px] uppercase font-bold opacity-30 mb-4 block tracking-widest">Institución / Colegio</label>
                                        <input type="text" placeholder="EJ: COLEGIO NACIONAL" className="w-full p-6 bg-offWhite rounded-3xl outline-none font-bold placeholder:opacity-30 uppercase text-sm" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-6">
                                        <div className="w-full">
                                            <label className="mono text-[10px] uppercase font-bold opacity-30 mb-4 block tracking-widest">Día</label>
                                            <select className="w-full p-6 bg-offWhite rounded-3xl font-bold uppercase text-sm cursor-pointer outline-none">
                                                <option value="1">Lunes</option>
                                                <option value="2">Martes</option>
                                                <option value="3">Miércoles</option>
                                                <option value="4">Jueves</option>
                                                <option value="5">Viernes</option>
                                            </select>
                                        </div>
                                        <div className="w-full">
                                            <label className="mono text-[10px] uppercase font-bold opacity-30 mb-4 block tracking-widest">Sección</label>
                                            <input type="text" placeholder="A" className="w-full p-6 bg-offWhite rounded-3xl outline-none font-bold text-center uppercase text-sm" />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="mono text-[10px] uppercase font-bold opacity-30 mb-4 block tracking-widest">Entrada</label>
                                        <input type="time" className="w-full p-6 bg-offWhite rounded-3xl font-bold outline-none uppercase text-sm" />
                                    </div>
                                    <div>
                                        <label className="mono text-[10px] uppercase font-bold opacity-30 mb-4 block tracking-widest">Salida</label>
                                        <input type="time" className="w-full p-6 bg-offWhite rounded-3xl font-bold outline-none uppercase text-sm" />
                                    </div>
                                </div>
                                <button onClick={() => setView('dashboard')} className="w-full bg-signalRed text-white py-8 rounded-3xl font-bold uppercase tracking-[0.3em] text-xs shadow-2xl shadow-signalRed/40 magnetic-btn">
                                    Inyectar en Matriz PRO
                                </button>
                            </div>
                        </section>
                    )}

                    {view === 'library' && (
                        <section className="pt-48 pb-32 px-8 max-w-7xl mx-auto">
                            <h2 className="text-7xl font-bold uppercase tracking-tighter mb-16 leading-[0.8]">Bóveda de <span className="drama-italic text-signalRed">Planes</span></h2>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                {INITIAL_PLANS.map(p => (
                                    <div key={p.id} onClick={() => setViewer(p)} className="bg-white p-10 rounded-cinematic border border-black/5 hover:border-signalRed shadow-sm hover:shadow-2xl transition-all cursor-pointer group">
                                        <div className="mono text-[9px] uppercase font-bold text-signalRed mb-6 tracking-widest">{p.level}</div>
                                        <h3 className="text-2xl font-bold uppercase mb-10 leading-tight group-hover:text-signalRed transition-colors">{p.title}</h3>
                                        <div className="flex items-center gap-3 mono text-[9px] uppercase font-bold opacity-20 group-hover:opacity-100 transition-all">
                                            Leer Protocolo <Icon name="ArrowRight" size={14} />
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>
                    )}

                    <footer className="bg-coal text-white p-24 md:p-40 rounded-t-[5rem] mt-32">
                        <div className="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-24">
                            <div>
                                <div className="text-6xl font-bold uppercase mb-8 tracking-tighter">MEC <span className="drama-italic text-signalRed text-5xl">PRO</span></div>
                                <p className="opacity-40 max-w-sm text-sm mono uppercase leading-relaxed">Instrumento digital para la gestión pedagógica de alto rendimiento. República del Paraguay 2026.</p>
                            </div>
                            <div className="flex flex-col md:items-end justify-end space-y-6">
                                <div className="flex items-center gap-4 py-3 px-6 bg-white/5 rounded-full mono text-[10px] uppercase tracking-widest">
                                    <div className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                                    Sistema Operacional Activo
                                </div>
                                <div className="opacity-20 mono text-[9px] uppercase tracking-[0.5em]">Creative Technologist Lead Build</div>
                            </div>
                        </div>
                    </footer>

                    {viewer && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center p-8">
                            <div className="absolute inset-0 bg-coal/90 backdrop-blur-3xl" onClick={() => setViewer(null)}></div>
                            <div className="bg-white w-full max-w-4xl h-[85vh] rounded-cinematic relative z-10 overflow-hidden flex flex-col shadow-2xl">
                                <div className="p-10 border-b border-black/5 flex justify-between items-center">
                                    <div className="mono text-xs uppercase font-bold text-signalRed">Protocolo MEC // {viewer.level}</div>
                                    <button onClick={() => setViewer(null)} className="p-4 bg-offWhite rounded-2xl hover:bg-coal hover:text-white transition-all"><Icon name="X" size={24} /></button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-12 md:p-20 prose prose-neutral max-w-none prose-h1:uppercase prose-h1:font-bold" 
                                     dangerouslySetInnerHTML={{ __html: marked.parse(viewer.content) }}></div>
                                <div className="p-10 bg-offWhite flex justify-end">
                                    <button onClick={() => setViewer(null)} className="px-12 py-4 bg-coal text-white rounded-2xl font-bold uppercase text-[10px] tracking-widest magnetic-btn shadow-xl">Cerrar Protocolo</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const rootElem = document.getElementById('root');
        ReactDOM.createRoot(rootElem).render(<App />);
    </script>
</body>
</html>
