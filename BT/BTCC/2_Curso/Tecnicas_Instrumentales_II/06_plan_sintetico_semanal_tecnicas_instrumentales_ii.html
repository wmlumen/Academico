var filaSeleccionada = null;

function renderEvidencia(ev, link) {
    if (!link || link.trim() === '') {
        return '<span class="ev-text">' + ev + '</span>';
    }
    var esExterno = link.match(/^https?:\/\//) ? true : false;
    var target = esExterno ? ' target="_blank" rel="noopener"' : '';
    var cls = esExterno ? 'ev-link ext' : 'ev-link';
    return '<a href="' + link + '" class="' + cls + '"' + target + ' data-ev="' + ev + '">' + ev + '</a>';
}

function renderPlan() {
    var tbody = document.getElementById('planBody');
    var html = '';
    SEMANAS.forEach(function(f, idx) {
        var selAttr = 'data-idx="' + idx + '"';
        html += '<tr ' + selAttr + ' style="cursor:pointer">';
        html += '<td>' + f.s + '</td>';
        html += '<td>' + f.mes + '</td>';
        html += '<td><strong>' + f.tema + '</strong></td>';
        html += '<td>' + f.capacidad + '</td>';
        html += '<td>' + f.actividad + '</td>';
        html += '<td>' + renderEvidencia(f.evidencia, f.enlace) + '</td>';
        html += '</tr>';
    });
    tbody.innerHTML = html;

    // Click para seleccionar fila
    tbody.querySelectorAll('tr').forEach(function(tr) {
        tr.addEventListener('click', function() {
            tbody.querySelectorAll('tr').forEach(function(r) { r.style.background = ''; });
            this.style.background = '#e8f4fd';
            filaSeleccionada = parseInt(this.getAttribute('data-idx'), 10);
            var f = SEMANAS[filaSeleccionada];
            document.getElementById('linkEditor').value = f.enlace || '';
            document.getElementById('linkEditor').focus();
        });
    });
}

function aplicarEnlace() {
    if (filaSeleccionada === null || filaSeleccionada === undefined) {
        alert('Seleccione una fila haciendo clic en ella primero.');
        return;
    }
    var nuevoLink = document.getElementById('linkEditor').value.trim();
    SEMANAS[filaSeleccionada].enlace = nuevoLink;
    renderPlan();
    // Re-seleccionar la misma fila
    var tbody = document.getElementById('planBody');
    var tr = tbody.querySelector('tr[data-idx="' + filaSeleccionada + '"]');
    if (tr) {
        tr.style.background = '#e8f4fd';
    }
    // Guardar en localStorage
    try {
        localStorage.setItem('plan_sintetico_tecnicas_enlaces', JSON.stringify(
            SEMANAS.map(function(f) { return f.enlace; })
        ));
    } catch(e) {}
}

function cargarEnlacesGuardados() {
    try {
        var raw = localStorage.getItem('plan_sintetico_tecnicas_enlaces');
        if (!raw) return;
        var enlaces = JSON.parse(raw);
        if (enlaces && enlaces.length === SEMANAS.length) {
            SEMANAS.forEach(function(f, i) {
                if (enlaces[i]) f.enlace = enlaces[i];
            });
        }
    } catch(e) {}
}

window.addEventListener('DOMContentLoaded', function() {
    cargarEnlacesGuardados();
    renderPlan();
});
