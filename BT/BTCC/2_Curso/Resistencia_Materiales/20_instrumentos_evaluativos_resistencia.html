<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI",Tahoma,sans-serif;background:#f0f4fa;color:#172133}
.wrap{max-width:1600px;margin:0 auto;padding:16px}

.header{background:linear-gradient(135deg,#0f4c81,#1e6fb0);color:#fff;padding:16px 22px;border-radius:14px;margin-bottom:12px}
.header h1{margin:0;font-size:20px}
.header p{margin:4px 0 0;font-size:13px;opacity:.9}
.header .meta{margin-top:6px;font-size:12px;opacity:.75}
.header .meta a{color:#fff;font-weight:600}
.header .badge{display:inline-block;background:rgba(255,255,255,0.2);padding:2px 10px;border-radius:10px;margin-left:8px;font-size:11px}

/* Toolbar */
.toolbar{background:#fff;border:1px solid #d8e3ef;border-radius:12px;padding:10px 14px;margin-bottom:14px;display:flex;flex-wrap:wrap;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(23,33,51,0.06)}
.toolbar .stats{display:flex;gap:14px;font-size:12px;margin-left:auto}
.toolbar .stats span{padding:3px 10px;border-radius:6px}
.toolbar .stats .s-total{background:#e3f2fd;color:#0f4c81}
.toolbar .stats .s-hecho{background:#e8f5e9;color:#1b5e20}
.toolbar .btn{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;transition:all .12s}
.toolbar .btn.pri{background:#0f4c81;color:#fff}
.toolbar .btn.pri:hover{background:#1a5f9a}
.toolbar .btn.sec{background:#e8f1fb;color:#0f4c81;border:1px solid #c8d9ea}
.toolbar .btn.sec:hover{background:#d4e4f5}

/* Tipo de instrumento tabs */
.type-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.type-tabs button{padding:6px 14px;border:1.5px solid #c8d9ea;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:#fff;color:#4d6177;transition:all .12s}
.type-tabs button:hover{background:#e8f1fb}
.type-tabs button.active{background:#0f4c81;color:#fff;border-color:#0f4c81}

/* Accordion sections */
.inst-section{background:#fff;border:1px solid #d8e3ef;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(23,33,51,0.04);margin-bottom:10px}
.inst-header{background:linear-gradient(135deg,#0f4c81,#1e6fb0);color:#fff;padding:10px 14px;font-size:13px;font-weight:700;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:background .15s}
.inst-header:hover{background:linear-gradient(135deg,#1a5f9a,#2a7fc0)}
.inst-header .toggle{font-size:16px;transition:transform .2s;user-select:none}
.inst-header .toggle.open{transform:rotate(90deg)}
.inst-header .status-badge{font-size:10px;background:rgba(255,255,255,0.2);padding:2px 10px;border-radius:10px;font-weight:400}
.inst-header .status-badge.some{background:#fff3e0;color:#333}
.inst-header .status-badge.all{background:#4caf50}
.inst-body{display:none;border-top:1px solid #d8e3ef}
.inst-body.open{display:block}

/* Instrument info bar */
.inst-info{display:flex;flex-wrap:wrap;gap:8px;padding:8px 14px;background:#f5f9ff;border-bottom:1px solid #e8ecf0;font-size:11px;color:#4d6177;align-items:center}
.inst-info .tag{display:inline-block;padding:1px 8px;border-radius:4px;background:#e3f2fd;color:#0f4c81;font-weight:600;font-size:10px}
.inst-info .date-apply{display:flex;align-items:center;gap:6px;margin-left:auto}
.inst-info .date-apply input{padding:2px 6px;border:1px solid #d8e0ea;border-radius:4px;font-size:11px}

/* Main matrix table */
.matrix-wrap{overflow-x:auto;max-height:600px;overflow-y:auto}
table.matrix{width:100%;border-collapse:collapse;font-size:11px}
table.matrix th{background:#e8f1fb;color:#0f4c81;font-weight:600;padding:5px 4px;text-align:center;border-bottom:2px solid #c8d9ea;font-size:10px;white-space:nowrap;position:sticky;top:0;z-index:2}
table.matrix th.sticky-crit{position:sticky;left:0;z-index:3;background:#e8f1fb;text-align:left;min-width:160px;max-width:200px}
table.matrix th.sticky-crit::after{content:'';position:absolute;right:-2px;top:0;height:100%;width:2px;background:#c8d9ea}
table.matrix td{padding:4px 3px;border-bottom:1px solid #e8ecf0;vertical-align:middle;text-align:center}
table.matrix td.sticky-crit{position:sticky;left:0;z-index:1;background:#fff;text-align:left;font-weight:500;color:#2a405c;max-width:200px;overflow:hidden;text-overflow:ellipsis}
table.matrix tr:hover td.sticky-crit{background:#f5f9ff}
table.matrix tr:hover td{background:#fafcff}
table.matrix tr.total-row td{background:#f5f9ff;font-weight:700;font-size:11px;border-top:2px solid #c8d9ea}
table.matrix tr.total-row td.sticky-crit{background:#f5f9ff}
table.matrix tr.total-row td.total-val{color:#0f4c81;font-size:12px}

/* Student header in table */
table.matrix .stu-hdr{writing-mode:vertical-lr;transform:rotate(180deg);font-size:9px;font-weight:600;padding:2px;white-space:nowrap;height:80px;text-align:center;color:#2a405c}
table.matrix .stu-hdr .stu-num{display:block;font-size:7px;color:#4d6177}

/* Score controls inline */
.score-si-no{display:flex;gap:1px;justify-content:center}
.score-si-no button{padding:2px 5px;border:1.5px solid #d8e0ea;border-radius:3px;font-size:9px;font-weight:700;cursor:pointer;background:#fff;transition:all .08s;min-width:24px;line-height:1.2}
.score-si-no button.si-on{background:#c8e6c9;border-color:#2e7d32;color:#1b5e20}
.score-si-no button.no-on{background:#ffcdd2;border-color:#c62828;color:#b71c1c}
.score-si-no button.si-na{background:#f5f5f5;border-color:#ccc;color:#999}

select.cell-score{padding:2px 2px;border:1px solid #d8e0ea;border-radius:3px;font-size:9px;background:#fff;text-align:center;min-width:28px;max-width:36px}
select.cell-score:focus{border-color:#0f4c81;outline:none}
select.cell-score.level-4{background:#e8f5e9}
select.cell-score.level-3{background:#fff3e0}
select.cell-score.level-2{background:#fff8e1}
select.cell-score.level-1{background:#ffebee}

/* Summary section */
.summary{background:#fff;border:1px solid #d8e3ef;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(23,33,51,0.04);margin-bottom:14px}
.summary-header{background:linear-gradient(135deg,#2e7d32,#4caf50);color:#fff;padding:9px 14px;font-size:14px;font-weight:700;display:flex;justify-content:space-between}
.summary-body{padding:10px 14px;overflow-x:auto}
table.summary-tab{width:100%;border-collapse:collapse;font-size:10.5px}
table.summary-tab th{background:#e8f1fb;color:#0f4c81;font-weight:600;padding:4px 5px;text-align:center;border-bottom:2px solid #c8d9ea;font-size:9px;white-space:nowrap}
table.summary-tab td{padding:3px 5px;border-bottom:1px solid #e8ecf0;text-align:center}
table.summary-tab .app-yes{color:#1b5e20;font-weight:700}
table.summary-tab .app-no{color:#ccc}
table.summary-tab tr:hover td{background:#fafcff}

/* Date inline */
.date-cell input{padding:1px 3px;border:1px solid #d8e0ea;border-radius:3px;font-size:9px;width:80px;background:#fff}

@media(max-width:1000px){
  .toolbar{flex-direction:column;align-items:stretch}
  .toolbar .stats{margin-left:0;justify-content:space-around}
  table.matrix{font-size:10px}
}
@media print{.toolbar,.inst-header .toggle{display:none}.inst-body{display:block!important}.inst-section{break-inside:avoid}}
</style>

// ============================================================
//  ESTADO
// ============================================================

var evals = {};

function getEvals() {
  try { return JSON.parse(localStorage.getItem(INSTR_KEY)) || {}; } catch(e) { return {}; }
}
function saveEvals() { localStorage.setItem(INSTR_KEY, JSON.stringify(evals)); }

function cargarEstado() {
  evals = getEvals();
  INSTRUMENTS.forEach(function(inst) {
    if(!evals[inst.id]) evals[inst.id] = {};
    STUDENTS.forEach(function(s) {
      var sid = 's' + s.num;
      if(!evals[inst.id][sid]) evals[inst.id][sid] = { date: '', scores: {} };
    });
  });
}

function getStudentScore(instId, sNum, itemId) {
  if(!evals[instId]) return '';
  if(!evals[instId][sNum]) return '';
  var val = evals[instId][sNum].scores[itemId];
  return (val !== undefined && val !== null) ? val : '';
}

function getStudentDate(instId, sNum) {
  if(!evals[instId] || !evals[instId][sNum]) return '';
  return evals[instId][sNum].date || '';
}

function isAnyApplied(instId) {
  var e = evals[instId];
  if(!e) return false;
  var has = false;
  STUDENTS.forEach(function(s) {
    var sid = 's' + s.num;
    if(e[sid]) {
      Object.keys(e[sid].scores).forEach(function(k) {
        var v = e[sid].scores[k];
        if(v !== undefined && v !== null && v !== '') has = true;
      });
    }
  });
  return has;
}

function isStudentApplied(instId, sNum) {
  var e = evals[instId];
  if(!e || !e[sNum]) return false;
  var scores = e[sNum].scores;
  var has = false;
  Object.keys(scores).forEach(function(k) {
    var v = scores[k];
    if(v !== undefined && v !== null && v !== '') has = true;
  });
  return has;
}

function countApplied(instId) {
  var count = 0;
  STUDENTS.forEach(function(s) {
    if(isStudentApplied(instId, 's' + s.num)) count++;
  });
  return count;
}

function getStudentTotal(instId, sNum) {
  var scores = evals[instId] && evals[instId][sNum] ? evals[instId][sNum].scores : {};
  var total = 0, maxTotal = 0, hasAny = false;
  var inst = null;
  INSTRUMENTS.forEach(function(i) { if(i.id === instId) inst = i; });
  if(!inst) return null;
  inst.items.forEach(function(item) {
    var val = scores[item.id];
    if(val !== undefined && val !== null && val !== '') {
      var n = parseFloat(val);
      if(!isNaN(n)) { total += n; hasAny = true; }
    }
    if(inst.type === 'rubric') { maxTotal += inst.levels[0].val; }
    else if(inst.type === 'numeric') { maxTotal += item.max; }
    else { maxTotal += 1; } // si_no
  });
  if(!hasAny) return null;
  return { total: total, max: maxTotal, pct: Math.round(total/maxTotal*100) };
}

// ============================================================
//  RENDER
// ============================================================

function getIndName(indId) {
  if(!window.INDICATORS) return indId;
  for(var i = 0; i < INDICATORS.length; i++) {
    if(INDICATORS[i].id === indId) return INDICATORS[i].tema;
  }
  return indId;
}

function renderAll() {
  renderSummary();
  renderInstruments();
  updateStats();
}

function renderSummary() {
  var body = document.getElementById('summaryBody');
  var totalInst = INSTRUMENTS.length;
  var html = '<table class="summary-tab"><thead><tr><th style="text-align:left;position:sticky;left:0;background:#e8f1fb;z-index:2">Alumno</th>';
  INSTRUMENTS.forEach(function(inst) {
    html += '<th style="font-size:8px" title="' + inst.name + '">' + inst.id.replace('a','A') + '</th>';
  });
  html += '<th style="min-width:60px">Aplicados</th><th>%</th></tr></thead><tbody>';

  var totalAppliedAll = 0;
  STUDENTS.forEach(function(s) {
    var sid = 's' + s.num;
    var applied = 0;
    html += '<tr><td style="text-align:left;font-weight:600;position:sticky;left:0;background:#fff;z-index:1">' + s.num + '. ' + s.name.split(',')[0] + '</td>';
    INSTRUMENTS.forEach(function(inst) {
      var isApp = isStudentApplied(inst.id, sid);
      if(isApp) applied++;
      html += '<td>' + (isApp ? '<span class="app-yes">✅</span>' : '<span class="app-no">⬜</span>') + '</td>';
    });
    var pct = totalInst > 0 ? Math.round(applied/totalInst*100) : 0;
    html += '<td style="font-weight:700">' + applied + '/' + totalInst + '</td>';
    html += '<td style="font-weight:700;color:' + (pct >= 70 ? '#1b5e20' : '#e65100') + '">' + pct + '%</td></tr>';
    totalAppliedAll += applied;
  });
  html += '</tbody></table>';
  body.innerHTML = html;
  document.getElementById('summaryCount').textContent = totalAppliedAll + ' evaluaciones aplicadas';
  window._totalApplied = totalAppliedAll;
}

function updateStats() {
  document.getElementById('totalInst').textContent = INSTRUMENTS.length;
  var totalAll = 0;
  INSTRUMENTS.forEach(function(inst) {
    totalAll += countApplied(inst.id);
  });
  document.getElementById('totalApplied').textContent = totalAll;
}

function renderInstruments() {
  var container = document.getElementById('instrumentsContainer');
  var html = '';

  INSTRUMENTS.forEach(function(inst, idx) {
    var anyApp = isAnyApplied(inst.id);
    var cnt = countApplied(inst.id);
    var badgeClass = 'status-badge';
    if(cnt === STUDENTS.length) badgeClass += ' all';
    else if(cnt > 0) badgeClass += ' some';
    var badgeText = cnt > 0 ? cnt + '/' + STUDENTS.length + ' alumnos' : 'Pendiente';

    html += '<div class="inst-section" id="sec-' + inst.id + '">';
    html += '<div class="inst-header" onclick="toggleInstrument(\'' + inst.id + '\')">';
    html += '<span><span class="toggle" id="tog-' + inst.id + '">▶</span> ' + inst.name + '</span>';
    html += '<span class="' + badgeClass + '" id="badge-' + inst.id + '">' + badgeText + '</span>';
    html += '</div>';

    html += '<div class="inst-body" id="body-' + inst.id + '">';

    // Info bar
    html += '<div class="inst-info">';
    html += '<span>📌 Indicadores RSA: ';
    inst.indicators.forEach(function(indId, i) {
      html += '<span class="tag">' + getIndName(indId) + '</span>';
      if(i < inst.indicators.length - 1) html += ' ';
    });
    html += '</span>';
    html += '<span class="date-apply">📅 Fecha aplicación global: <input type="date" id="gdate-' + inst.id + '" onchange="setGlobalDate(\'' + inst.id + '\',this.value)"></span>';
    html += '</div>';

    // Matrix table
    html += '<div class="matrix-wrap">';
    html += '<table class="matrix" id="mtab-' + inst.id + '"><thead><tr>';
    html += '<th class="sticky-crit" style="min-width:180px">📌 Criterio</th>';
    STUDENTS.forEach(function(s) {
      html += '<th><div class="stu-hdr"><span class="stu-num">' + s.num + '.</span>' + s.name.split(',')[0] + '</div></th>';
    });
    html += '</tr></thead><tbody>';

    if(inst.type === 'si_no') {
      html += renderSiNoMatrix(inst);
    } else if(inst.type === 'rubric') {
      html += renderRubricMatrix(inst);
    } else if(inst.type === 'numeric') {
      html += renderNumericMatrix(inst);
    }

    html += '</tbody></table></div>'; // matrix-wrap
    html += '</div></div>'; // body, section
  });

  container.innerHTML = html;
  if(INSTRUMENTS.length > 0) toggleInstrument(INSTRUMENTS[0].id);
}

function renderSiNoMatrix(inst) {
  var html = '';
  inst.items.forEach(function(item) {
    html += '<tr class="criterio-row">';
    html += '<td class="sticky-crit">' + item.name + '</td>';
    STUDENTS.forEach(function(s) {
      var sid = 's' + s.num;
      var val = getStudentScore(inst.id, sid, item.id);
      var siOn = (val === '1' || val === 1 || val === true);
      var noOn = (val === '0' || val === 0 || val === false);
      html += '<td><div class="score-si-no">';
      html += '<button id="si-' + inst.id + '-' + item.id + '-' + s.num + '" class="' + (siOn ? 'si-on' : '') + '" onclick="setScore(\'' + inst.id + '\',\'' + item.id + '\',' + s.num + ',\'1\')">S</button>';
      html += '<button id="no-' + inst.id + '-' + item.id + '-' + s.num + '" class="' + (noOn ? 'no-on' : '') + '" onclick="setScore(\'' + inst.id + '\',\'' + item.id + '\',' + s.num + ',\'0\')">N</button>';
      html += '</div></td>';
    });
    html += '</tr>';
  });
  // Total row
  html += '<tr class="total-row"><td class="sticky-crit"><strong>Total</strong></td>';
  STUDENTS.forEach(function(s) {
    var sid = 's' + s.num;
    var r = getStudentTotal(inst.id, sid);
    html += '<td class="total-val">' + (r ? r.total + '/' + r.max : '—') + '</td>';
  });
  html += '</tr>';
  return html;
}

function renderRubricMatrix(inst) {
  var html = '';
  inst.items.forEach(function(item) {
    html += '<tr class="criterio-row">';
    html += '<td class="sticky-crit" title="' + item.levels.join(' | ') + '">' + item.name + '</td>';
    STUDENTS.forEach(function(s) {
      var sid = 's' + s.num;
      var val = getStudentScore(inst.id, sid, item.id);
      html += '<td>';
      html += '<select class="cell-score" onchange="setScore(\'' + inst.id + '\',\'' + item.id + '\',' + s.num + ',this.value)">';
      html += '<option value="">—</option>';
      inst.levels.forEach(function(lvl) {
        var sel = (val == lvl.val) ? ' selected' : '';
        html += '<option value="' + lvl.val + '" class="level-' + lvl.val + '"' + sel + '>' + lvl.val + '</option>';
      });
      html += '</select></td>';
    });
    html += '</tr>';
  });
  // Total row
  html += '<tr class="total-row"><td class="sticky-crit"><strong>Total</strong></td>';
  STUDENTS.forEach(function(s) {
    var sid = 's' + s.num;
    var r = getStudentTotal(inst.id, sid);
    html += '<td class="total-val">' + (r ? r.total + '/' + r.max : '—') + '</td>';
  });
  html += '</tr>';
  return html;
}

function renderNumericMatrix(inst) {
  var html = '';
  inst.items.forEach(function(item) {
    html += '<tr class="criterio-row">';
    html += '<td class="sticky-crit">' + item.name + '</td>';
    STUDENTS.forEach(function(s) {
      var sid = 's' + s.num;
      var val = getStudentScore(inst.id, sid, item.id);
      html += '<td>';
      html += '<select class="cell-score" onchange="setScore(\'' + inst.id + '\',\'' + item.id + '\',' + s.num + ',this.value)">';
      html += '<option value="">—</option>';
      for(var i = 0; i <= item.max; i++) {
        var sel = (val == i) ? ' selected' : '';
        html += '<option value="' + i + '"' + sel + '>' + i + '</option>';
      }
      html += '</select></td>';
    });
    html += '</tr>';
  });
  // Total row
  html += '<tr class="total-row"><td class="sticky-crit"><strong>Total</strong></td>';
  STUDENTS.forEach(function(s) {
    var sid = 's' + s.num;
    var r = getStudentTotal(inst.id, sid);
    html += '<td class="total-val">' + (r ? r.total + '/' + r.max : '—') + '</td>';
  });
  html += '</tr>';
  return html;
}

// ============================================================
//  ACCIONES
// ============================================================

function setScore(instId, itemId, sNum, value) {
  var sid = 's' + sNum;
  if(!evals[instId]) evals[instId] = {};
  if(!evals[instId][sid]) evals[instId][sid] = { date: '', scores: {} };
  evals[instId][sid].scores[itemId] = value;
  // Auto-fecha si no tiene
  if(!evals[instId][sid].date) {
    evals[instId][sid].date = new Date().toISOString().split('T')[0];
  }
  saveEvals();
  // Refresh
  renderAll();
}

function setGlobalDate(instId, value) {
  if(!value) return;
  if(!evals[instId]) evals[instId] = {};
  STUDENTS.forEach(function(s) {
    var sid = 's' + s.num;
    if(!evals[instId][sid]) evals[instId][sid] = { date: '', scores: {} };
    if(!evals[instId][sid].date) {
      evals[instId][sid].date = value;
    }
  });
  saveEvals();
  renderAll();
}

function toggleInstrument(id) {
  var body = document.getElementById('body-' + id);
  var tog = document.getElementById('tog-' + id);
  if(!body || !tog) return;
  var isOpen = body.classList.contains('open');
  document.querySelectorAll('.inst-body').forEach(function(el) { el.classList.remove('open'); });
  document.querySelectorAll('.inst-header .toggle').forEach(function(el) { el.classList.remove('open'); });
  if(!isOpen) {
    body.classList.add('open');
    tog.classList.add('open');
  }
}

function expandirTodos() {
  var allClosed = document.querySelectorAll('.inst-body:not(.open)').length > 0;
  document.querySelectorAll('.inst-body').forEach(function(el) {
    if(allClosed) el.classList.add('open'); else el.classList.remove('open');
  });
  document.querySelectorAll('.inst-header .toggle').forEach(function(el) {
    if(allClosed) el.classList.add('open'); else el.classList.remove('open');
  });
}
