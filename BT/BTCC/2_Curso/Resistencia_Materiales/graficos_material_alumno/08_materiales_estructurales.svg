<svg xmlns="http://www.w3.org/2000/svg" width="860" height="420" viewBox="0 0 860 420">
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="430" y="34" text-anchor="middle" font-family="Segoe UI, Arial" font-size="24" fill="#0f4c81">Materiales Estructurales y Usos</text>
  <rect x="90" y="100" width="190" height="220" fill="#fef3c7" stroke="#b45309" stroke-width="3"/>
  <rect x="335" y="100" width="190" height="220" fill="#e5e7eb" stroke="#4b5563" stroke-width="3"/>
  <rect x="580" y="100" width="190" height="220" fill="#dbeafe" stroke="#1d4ed8" stroke-width="3"/>
  <text x="185" y="135" text-anchor="middle" font-family="Segoe UI, Arial" font-size="22" fill="#92400e">Madera</text>
  <text x="430" y="135" text-anchor="middle" font-family="Segoe UI, Arial" font-size="22" fill="#374151">Acero</text>
  <text x="675" y="135" text-anchor="middle" font-family="Segoe UI, Arial" font-size="22" fill="#1d4ed8">Hormigón</text>
  <text x="112" y="175" font-family="Segoe UI, Arial" font-size="17" fill="#374151">• Liviana</text>
  <text x="112" y="205" font-family="Segoe UI, Arial" font-size="17" fill="#374151">• Encofrados y cubiertas</text>
  <text x="112" y="235" font-family="Segoe UI, Arial" font-size="17" fill="#374151">• Flexión moderada</text>
  <text x="357" y="175" font-family="Segoe UI, Arial" font-size="17" fill="#374151">• Alta tracción</text>
  <text x="357" y="205" font-family="Segoe UI, Arial" font-size="17" fill="#374151">• Perfiles y armaduras</text>
  <text x="357" y="235" font-family="Segoe UI, Arial" font-size="17" fill="#374151">• Buen comportamiento dúctil</text>
  <text x="602" y="175" font-family="Segoe UI, Arial" font-size="17" fill="#374151">• Alta compresión</text>
  <text x="602" y="205" font-family="Segoe UI, Arial" font-size="17" fill="#374151">• Columnas, vigas, losas</text>
  <text x="602" y="235" font-family="Segoe UI, Arial" font-size="17" fill="#374151">• Durabilidad y masa</text>
  <path d="M130 300 L185 255 L240 300" fill="none" stroke="#0f766e" stroke-width="6"/>
  <text x="145" y="330" font-family="Segoe UI, Arial" font-size="17" fill="#0f766e">Ejemplo: cercha</text>
  <text x="315" y="365" font-family="Segoe UI, Arial" font-size="17" fill="#374151">Cada material se selecciona según el esfuerzo predominante y el uso constructivo.</text>
</svg>
