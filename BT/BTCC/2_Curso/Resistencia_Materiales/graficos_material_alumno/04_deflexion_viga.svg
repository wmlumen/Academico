<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360">
  <rect width="100%" height="100%" fill="white"/>
  <text x="450" y="35" text-anchor="middle" font-family="Segoe UI, Arial" font-size="24" font-weight="700">Deflexion o flecha de una viga</text>
  <line x1="120" y1="150" x2="780" y2="150" stroke="#111" stroke-width="4"/>
  <path d="M120,150 C260,170 360,250 450,250 C540,250 640,170 780,150" fill="none" stroke="#7c3aed" stroke-width="5"/>
  <polygon points="120,150 100,190 140,190" fill="#111"/>
  <polygon points="780,150 760,190 800,190" fill="#777"/>
  <circle cx="450" cy="250" r="6" fill="#dc2626"/>
  <line x1="450" y1="150" x2="450" y2="250" stroke="#dc2626" stroke-dasharray="6 6" stroke-width="2"/>
  <text x="468" y="208" font-family="Segoe UI, Arial" font-size="18" fill="#dc2626">Flecha maxima</text>
  <text x="170" y="115" font-family="Segoe UI, Arial" font-size="18" fill="#111">Viga sin deformar</text>
  <text x="575" y="268" font-family="Segoe UI, Arial" font-size="18" fill="#7c3aed">Curva elastica</text>
  <text x="145" y="315" font-family="Segoe UI, Arial" font-size="18" fill="#333">La deformacion aumenta hacia la zona central cuando la carga actua sobre la viga.</text>
</svg>
