<svg xmlns="http://www.w3.org/2000/svg" width="860" height="420" viewBox="0 0 860 420">
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="430" y="34" text-anchor="middle" font-family="Segoe UI, Arial" font-size="24" fill="#0f4c81">Secuencia de una Memoria de Cálculo</text>
  <rect x="70" y="120" width="120" height="70" rx="10" fill="#dbeafe" stroke="#1d4ed8" stroke-width="3"/>
  <rect x="220" y="120" width="120" height="70" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"/>
  <rect x="370" y="120" width="120" height="70" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
  <rect x="520" y="120" width="120" height="70" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
  <rect x="670" y="120" width="120" height="70" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/>
  <text x="130" y="160" text-anchor="middle" font-family="Segoe UI, Arial" font-size="18" fill="#1e3a8a">Croquis</text>
  <text x="280" y="160" text-anchor="middle" font-family="Segoe UI, Arial" font-size="18" fill="#0c4a6e">Datos</text>
  <text x="430" y="160" text-anchor="middle" font-family="Segoe UI, Arial" font-size="18" fill="#166534">Fórmulas</text>
  <text x="580" y="160" text-anchor="middle" font-family="Segoe UI, Arial" font-size="18" fill="#92400e">Cálculo</text>
  <text x="730" y="160" text-anchor="middle" font-family="Segoe UI, Arial" font-size="18" fill="#991b1b">Conclusión</text>
  <line x1="190" y1="155" x2="220" y2="155" stroke="#6b7280" stroke-width="4"/>
  <line x1="340" y1="155" x2="370" y2="155" stroke="#6b7280" stroke-width="4"/>
  <line x1="490" y1="155" x2="520" y2="155" stroke="#6b7280" stroke-width="4"/>
  <line x1="640" y1="155" x2="670" y2="155" stroke="#6b7280" stroke-width="4"/>
  <text x="95" y="265" font-family="Segoe UI, Arial" font-size="17" fill="#374151">Una memoria ordenada permite justificar cada resultado técnico.</text>
  <text x="95" y="295" font-family="Segoe UI, Arial" font-size="17" fill="#374151">No basta con el número final: también deben aparecer el procedimiento y la interpretación.</text>
</svg>
