<svg xmlns="http://www.w3.org/2000/svg" width="860" height="420" viewBox="0 0 860 420">
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="430" y="34" text-anchor="middle" font-family="Segoe UI, Arial" font-size="24" fill="#0f4c81">Resultante y Momento</text>
  <line x1="90" y1="220" x2="430" y2="220" stroke="#374151" stroke-width="5"/>
  <circle cx="150" cy="220" r="8" fill="#111827"/>
  <text x="132" y="250" font-family="Segoe UI, Arial" font-size="18" fill="#374151">O</text>
  <line x1="280" y1="95" x2="280" y2="220" stroke="#dc2626" stroke-width="6"/>
  <polygon points="280,220 270,198 290,198" fill="#dc2626"/>
  <text x="245" y="88" font-family="Segoe UI, Arial" font-size="18" fill="#dc2626">F1 = 4 kN</text>
  <line x1="360" y1="75" x2="360" y2="220" stroke="#ea580c" stroke-width="6"/>
  <polygon points="360,220 350,198 370,198" fill="#ea580c"/>
  <text x="326" y="68" font-family="Segoe UI, Arial" font-size="18" fill="#ea580c">F2 = 6 kN</text>
  <line x1="620" y1="95" x2="620" y2="220" stroke="#2563eb" stroke-width="8"/>
  <polygon points="620,220 608,194 632,194" fill="#2563eb"/>
  <text x="586" y="86" font-family="Segoe UI, Arial" font-size="18" fill="#2563eb">R = 10 kN</text>
  <line x1="150" y1="280" x2="360" y2="280" stroke="#16a34a" stroke-width="3" stroke-dasharray="9 6"/>
  <line x1="150" y1="268" x2="150" y2="292" stroke="#16a34a" stroke-width="3"/>
  <line x1="360" y1="268" x2="360" y2="292" stroke="#16a34a" stroke-width="3"/>
  <text x="228" y="270" font-family="Segoe UI, Arial" font-size="18" fill="#16a34a">d = 2 m</text>
  <path d="M150 165 A70 70 0 0 1 225 95" fill="none" stroke="#7c3aed" stroke-width="4"/>
  <polygon points="224,95 206,98 216,110" fill="#7c3aed"/>
  <text x="188" y="110" font-family="Segoe UI, Arial" font-size="18" fill="#7c3aed">M = F · d</text>
  <text x="92" y="338" font-family="Segoe UI, Arial" font-size="17" fill="#374151">Izquierda: dos fuerzas del mismo sentido se pueden reemplazar por una resultante.</text>
  <text x="92" y="366" font-family="Segoe UI, Arial" font-size="17" fill="#374151">El momento depende del valor de la fuerza y de la distancia al punto O.</text>
</svg>
